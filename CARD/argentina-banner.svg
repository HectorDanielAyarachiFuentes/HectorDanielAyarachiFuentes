<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <!-- Sky gradient: Patagonian dusk/dawn -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#08102a"/>
      <stop offset="40%"  stop-color="#0d2055"/>
      <stop offset="75%"  stop-color="#1b4080"/>
      <stop offset="100%" stop-color="#2a6090"/>
    </linearGradient>
    <!-- Horizon glow -->
    <linearGradient id="horizonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#74ACDF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#74ACDF" stop-opacity="0.35"/>
    </linearGradient>
    <!-- Argentine flag colors text gradient -->
    <linearGradient id="argGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#74ACDF"/>
      <stop offset="35%"  stop-color="#ffffff"/>
      <stop offset="65%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#74ACDF"/>
    </linearGradient>
    <!-- Sub text gradient -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#64b5f6"/>
      <stop offset="50%"  stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>
    <!-- Mountain gradients -->
    <linearGradient id="mtnFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4a6d8c"/>
      <stop offset="100%" stop-color="#2e4a66"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#243d58"/>
      <stop offset="100%" stop-color="#162a40"/>
    </linearGradient>
    <linearGradient id="mtnNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#122030"/>
      <stop offset="100%" stop-color="#080e1a"/>
    </linearGradient>
    <!-- Argentine sun glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F6B40E" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#F6B40E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F6B40E" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigBlur"><feGaussianBlur stdDeviation="25"/></filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="900" height="200" fill="url(#sky)"/>

  <!-- Horizon atmospheric glow (Patagonian blue) -->
  <rect x="0" y="90" width="900" height="110" fill="url(#horizonGlow)" opacity="0.6"/>

  <!-- ═══ STARS (Southern Cross + scattered) ═══ -->
  <!-- Southern Cross (Cruz del Sur) - famed Southern Hemisphere asterism -->
  <!-- Approximate positions: cross shape top-right area -->
  <g filter="url(#starGlow)">
    <!-- Crux - 4 main stars + 1 smaller -->
    <circle cx="760" cy="22" r="2.2" fill="white" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.5;0.95" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="50" r="2.8" fill="white" opacity="1">
      <animate attributeName="opacity" values="1;0.6;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="745" cy="36" r="2.0" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3.1s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="775" cy="36" r="2.5" fill="white" opacity="1">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <!-- 5th smaller star nearby -->
    <circle cx="780" cy="28" r="1.3" fill="white" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <!-- "Cruz del Sur" label -->
    <text x="795" y="40" font-family="'Segoe UI', sans-serif" font-size="8" fill="#74ACDF" opacity="0.7">Cruz del Sur</text>
  </g>

  <!-- Scattered stars left side -->
  <circle cx="30"  cy="12"  r="1.0" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="85"  cy="28"  r="1.2" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.1s" begin="0.4s" repeatCount="indefinite"/></circle>
  <circle cx="55"  cy="45"  r="0.9" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.7s" begin="1.0s" repeatCount="indefinite"/></circle>
  <circle cx="140" cy="15"  r="1.3" fill="#ffe8c0" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.9s" begin="0.7s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="35"  r="1.0" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.5s" begin="0.2s" repeatCount="indefinite"/></circle>
  <circle cx="250" cy="18"  r="1.5" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.3;0.85" dur="2.1s" begin="1.3s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="40"  r="0.9" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.8s" begin="0.6s" repeatCount="indefinite"/></circle>
  <circle cx="370" cy="12"  r="1.1" fill="#d0e8ff" opacity="0.75"><animate attributeName="opacity" values="0.75;0.2;0.75" dur="2.6s" begin="0.9s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="30"  r="1.4" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.7s" begin="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="20"  r="1.0" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.2s" begin="0.1s" repeatCount="indefinite"/></circle>
  <circle cx="560" cy="38"  r="1.2" fill="#ffe8c0" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.4s" begin="0.8s" repeatCount="indefinite"/></circle>
  <circle cx="640" cy="16"  r="0.9" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.0s" begin="1.2s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="45"  r="1.3" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.35;0.85" dur="2.9s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="845" cy="18"  r="1.0" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="875" cy="40"  r="1.4" fill="#d0e8ff" opacity="0.85"><animate attributeName="opacity" values="0.85;0.3;0.85" dur="3.4s" begin="0.3s" repeatCount="indefinite"/></circle>

  <!-- Argentine Sun of May — rising over the Andes horizon -->
  <!-- Glow -->
  <ellipse cx="450" cy="105" rx="55" ry="35" fill="url(#sunGlow)" opacity="0.5">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Sun disk -->
  <circle cx="450" cy="100" r="14" fill="#F6B40E" opacity="0.85" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Sun rays (16 rays) -->
  <g transform="translate(450,100)" opacity="0.75" filter="url(#glow)">
    <line x1="0" y1="-20" x2="0" y2="-28" stroke="#F6B40E" stroke-width="1.5"/>
    <line x1="0" y1="20"  x2="0" y2="28"  stroke="#F6B40E" stroke-width="1.5"/>
    <line x1="-20" y1="0" x2="-28" y2="0" stroke="#F6B40E" stroke-width="1.5"/>
    <line x1="20" y1="0"  x2="28" y2="0"  stroke="#F6B40E" stroke-width="1.5"/>
    <line x1="-14" y1="-14" x2="-20" y2="-20" stroke="#F6B40E" stroke-width="1.2"/>
    <line x1="14"  y1="-14" x2="20"  y2="-20" stroke="#F6B40E" stroke-width="1.2"/>
    <line x1="-14" y1="14"  x2="-20" y2="20"  stroke="#F6B40E" stroke-width="1.2"/>
    <line x1="14"  y1="14"  x2="20"  y2="20"  stroke="#F6B40E" stroke-width="1.2"/>
    <!-- Wavy rays (diagonals) -->
    <line x1="-6" y1="-21" x2="-9"  y2="-29" stroke="#F6B40E" stroke-width="1.0"/>
    <line x1="6"  y1="-21" x2="9"   y2="-29" stroke="#F6B40E" stroke-width="1.0"/>
    <line x1="-21" y1="-6" x2="-29" y2="-9"  stroke="#F6B40E" stroke-width="1.0"/>
    <line x1="-21" y1="6"  x2="-29" y2="9"   stroke="#F6B40E" stroke-width="1.0"/>
    <line x1="21"  y1="-6" x2="29"  y2="-9"  stroke="#F6B40E" stroke-width="1.0"/>
    <line x1="21"  y1="6"  x2="29"  y2="9"   stroke="#F6B40E" stroke-width="1.0"/>
    <line x1="-6"  y1="21" x2="-9"  y2="29"  stroke="#F6B40E" stroke-width="1.0"/>
    <line x1="6"   y1="21" x2="9"   y2="29"  stroke="#F6B40E" stroke-width="1.0"/>
  </g>

  <!-- ═══ MOUNTAIN LAYERS (back to front) ═══ -->

  <!-- FAR mountains (Andes peaks, distant, lighter blue) -->
  <polygon points="
    0,140
    50,95  80,110  120,80  160,105
    200,72  240,98  280,65  320,90
    360,68  395,88  430,75  455,100
    470,78  500,95  540,70  580,92
    620,65  660,90  700,72  740,92
    780,68  820,88  860,72  900,90
    900,140
  " fill="url(#mtnFar)"/>

  <!-- Snow caps on far mountains -->
  <polygon points="120,80 130,88 110,88" fill="white" opacity="0.75"/>
  <polygon points="200,72 212,82 188,82" fill="white" opacity="0.75"/>
  <polygon points="280,65 292,77 268,77" fill="white" opacity="0.8"/>
  <polygon points="360,68 372,79 348,79" fill="white" opacity="0.75"/>
  <polygon points="430,75 440,84 420,84" fill="white" opacity="0.65"/>
  <polygon points="540,70 552,80 528,80" fill="white" opacity="0.8"/>
  <polygon points="620,65 632,76 608,76" fill="white" opacity="0.8"/>
  <polygon points="700,72 712,82 688,82" fill="white" opacity="0.7"/>
  <polygon points="780,68 792,79 768,79" fill="white" opacity="0.75"/>
  <!-- Highest peak: Lanín Volcano shape -->
  <polygon points="455,100 470,78 485,100" fill="url(#mtnFar)" opacity="0.5"/>
  <polygon points="468,82 476,78 484,82" fill="white" opacity="0.5"/>

  <!-- MID mountains -->
  <polygon points="
    0,150
    40,120  90,135  130,110  170,128
    210,105  250,122  290,108  335,125
    375,112  415,128  450,115  480,130
    520,110  560,127  600,112  640,128
    680,108  720,125  760,112  800,130
    840,115  880,130  900,125
    900,150
  " fill="url(#mtnMid)"/>

  <!-- NEAR hills/patagonian steppe edge -->
  <polygon points="
    0,170
    30,158  70,162  110,155  150,163
    200,152  250,160  300,154  350,162
    400,155  450,163  500,155  550,162
    600,154  650,163  700,155  750,162
    800,154  850,162  900,158
    900,170
  " fill="url(#mtnNear)"/>

  <!-- Ground / Patagonian steppe -->
  <rect x="0" y="168" width="900" height="32" fill="#080e1a"/>
  <!-- Steppe grass silhouette (tiny spikes) -->
  <g fill="#0e1820" opacity="0.8">
    <polygon points="10,168 14,158 18,168"/>
    <polygon points="22,168 26,161 30,168"/>
    <polygon points="45,168 49,155 53,168"/>
    <polygon points="100,168 104,162 108,168"/>
    <polygon points="180,168 184,156 188,168"/>
    <polygon points="260,168 264,160 268,168"/>
    <polygon points="340,168 344,157 348,168"/>
    <polygon points="440,168 444,159 448,168"/>
    <polygon points="530,168 534,155 538,168"/>
    <polygon points="625,168 629,161 633,168"/>
    <polygon points="720,168 724,157 728,168"/>
    <polygon points="810,168 814,160 818,168"/>
    <polygon points="870,168 874,156 878,168"/>
  </g>

  <!-- ═══ ANDEAN CONDOR silhouette (flying left) ═══ -->
  <g transform="translate(160, 62)" opacity="0.85">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="#1a1a2e"/>
    <!-- Left wing -->
    <path d="M -4,-2 C -15,-15 -35,-10 -50,-5 C -38,-8 -20,-4 -4,2 Z" fill="#1a1a2e"/>
    <!-- Right wing -->
    <path d="M 4,-2 C 15,-15 35,-10 50,-5 C 38,-8 20,-4 4,2 Z" fill="#1a1a2e"/>
    <!-- Head/neck -->
    <ellipse cx="10" cy="-3" rx="5" ry="4" fill="#1a1a2e"/>
    <!-- White collar (distinctive condor feature) -->
    <ellipse cx="8" cy="0" rx="4" ry="2.5" fill="#3a3a5a" opacity="0.6"/>
    <animate attributeName="transform" values="translate(160,62);translate(165,58);translate(160,62)" 
             dur="6s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Argentine flag stripes overlay at bottom (subtle) -->
  <rect x="0" y="185" width="900" height="5"  fill="#74ACDF" opacity="0.5"/>
  <rect x="0" y="190" width="900" height="5"  fill="#ffffff" opacity="0.4"/>
  <rect x="0" y="195" width="900" height="5"  fill="#74ACDF" opacity="0.5"/>

  <!-- ═══ TEXT ═══ -->
  <!-- Main location text -->
  <text x="450" y="152" text-anchor="middle"
        font-family="'Segoe UI', Ubuntu, sans-serif"
        font-size="22" font-weight="700"
        fill="url(#argGrad)" filter="url(#glow)"
        letter-spacing="4">
    NEUQUÉN  ·  PATAGONIA  ·  ARGENTINA
  </text>

  <!-- Sub text -->
  <text x="450" y="171" text-anchor="middle"
        font-family="'Segoe UI', Ubuntu, sans-serif"
        font-size="11" fill="#90aac8" letter-spacing="2">
    Tierra de dinosaurios, vientos libres y cielos infinitos  🦅
  </text>

  <!-- Argentine flag colors border top -->
  <rect x="0" y="0"   width="900" height="3" fill="#74ACDF" opacity="0.7"/>
  <rect x="0" y="3"   width="900" height="2" fill="#ffffff" opacity="0.5"/>
</svg>
