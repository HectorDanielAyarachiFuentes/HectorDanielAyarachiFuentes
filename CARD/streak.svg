<svg xmlns="http://www.w3.org/2000/svg" width="600" height="135" viewBox="0 0 600 135">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="135" rx="10" fill="url(#bgG)" stroke="#2a2b3d" stroke-width="1"/>
  <rect x="0" y="0" width="4" height="135" rx="2" fill="url(#hg)"/>

  <!-- Header -->
  <text x="20" y="32" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="15" font-weight="600" fill="url(#hg)">🔥 Streak &amp; Actividad</text>
  <line x1="20" y1="42" x2="580" y2="42" stroke="#2a2b3d" stroke-width="1"/>

  <!-- 3 columns: Total | Current Streak | Longest -->
  <!-- Column dividers -->
  <line x1="200" y1="48" x2="200" y2="128" stroke="#2a2b3d" stroke-width="1"/>
  <line x1="400" y1="48" x2="400" y2="128" stroke="#2a2b3d" stroke-width="1"/>

  <!-- Total Contributions -->
  <g transform="translate(100, 58)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">CONTRIBUCIONES</text>
    <text x="0" y="38" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#7aa2f7" filter="url(#glow)">1,247</text>
    <text x="0" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a9b1d6">Total acumulado</text>
  </g>

  <!-- Current Streak -->
  <g transform="translate(300, 58)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">RACHA ACTUAL</text>
    <text x="0" y="38" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#ff9e64" filter="url(#glow)">15 🔥</text>
    <text x="0" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a9b1d6">días consecutivos</text>
  </g>

  <!-- Longest Streak -->
  <g transform="translate(500, 58)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">RACHA MÁXIMA</text>
    <text x="0" y="38" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#9ece6a" filter="url(#glow)">42 🏆</text>
    <text x="0" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a9b1d6">días consecutivos</text>
  </g>
</svg>
