<svg xmlns="http://www.w3.org/2000/svg" width="310" height="210" viewBox="0 0 310 210">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="headerG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="310" height="210" rx="10" fill="url(#bgG)" stroke="#2a2b3d" stroke-width="1"/>
  <!-- Left accent border -->
  <rect x="0" y="0" width="4" height="210" rx="2" fill="url(#headerG)"/>

  <!-- Header -->
  <text x="20" y="35" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="15" font-weight="600" fill="url(#headerG)">📊 Top Lenguajes</text>
  <line x1="20" y1="45" x2="290" y2="45" stroke="#2a2b3d" stroke-width="1"/>

  <!-- Combined progress bar -->
  <text x="20" y="66" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280">Distribución</text>
  <!-- Background bar -->
  <rect x="20" y="72" width="270" height="10" rx="5" fill="#2a2b3d"/>
  <!-- JS 38% -->
  <rect x="20"   y="72" width="102" height="10" rx="5" fill="#f7df1e"/>
  <!-- Fix corners: inner pieces have no radius -->
  <rect x="82"  y="72" width="40"  height="10" fill="#f7df1e"/>
  <!-- Python 25% -->
  <rect x="122" y="72" width="68"  height="10" fill="#3572A5"/>
  <!-- Java 18% -->
  <rect x="190" y="72" width="48"  height="10" fill="#b07219"/>
  <!-- HTML 10% -->
  <rect x="238" y="72" width="27"  height="10" fill="#e34c26"/>
  <!-- CSS 9% last -->
  <rect x="265" y="72" width="25"  height="10" rx="5" fill="#563d7c"/>
  <!-- Fix left radius of css -->
  <rect x="265" y="72" width="5"   height="10" fill="#563d7c"/>

  <!-- Language list with percentages -->
  <!-- JS -->
  <g transform="translate(20, 97)">
    <rect width="12" height="12" rx="3" fill="#f7df1e"/>
    <text x="18" y="11" font-family="'Segoe UI', sans-serif" font-size="12" fill="#c0caf5">JavaScript</text>
    <text x="200" y="11" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#f7df1e">38.0%</text>
  </g>
  <!-- Python -->
  <g transform="translate(20, 117)">
    <rect width="12" height="12" rx="3" fill="#3572A5"/>
    <text x="18" y="11" font-family="'Segoe UI', sans-serif" font-size="12" fill="#c0caf5">Python</text>
    <text x="200" y="11" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#3572A5">25.0%</text>
  </g>
  <!-- Java -->
  <g transform="translate(20, 137)">
    <rect width="12" height="12" rx="3" fill="#b07219"/>
    <text x="18" y="11" font-family="'Segoe UI', sans-serif" font-size="12" fill="#c0caf5">Java</text>
    <text x="200" y="11" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#b07219">18.0%</text>
  </g>
  <!-- HTML -->
  <g transform="translate(20, 157)">
    <rect width="12" height="12" rx="3" fill="#e34c26"/>
    <text x="18" y="11" font-family="'Segoe UI', sans-serif" font-size="12" fill="#c0caf5">HTML</text>
    <text x="200" y="11" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#e34c26">10.0%</text>
  </g>
  <!-- CSS -->
  <g transform="translate(20, 177)">
    <rect width="12" height="12" rx="3" fill="#563d7c"/>
    <text x="18" y="11" font-family="'Segoe UI', sans-serif" font-size="12" fill="#c0caf5">CSS</text>
    <text x="200" y="11" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#a855f7">9.0%</text>
  </g>
</svg>
