<svg xmlns="http://www.w3.org/2000/svg" width="300" height="195" viewBox="0 0 300 195" fill="none" role="img" aria-labelledby="descLangs">
  <title id="descLangs">Top Languages</title>
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, sans-serif; fill: #a9b1d6; }
    .lang-name { font: 400 11px 'Segoe UI', Ubuntu, sans-serif; fill: #a9b1d6; }
    .lang-pct  { font: 600 11px 'Segoe UI', Ubuntu, sans-serif; fill: #c0caf5; }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" height="99%" stroke="#1a1b26" width="299" fill="#1a1b26" stroke-opacity="1"/>

  <!-- Header -->
  <text x="25" y="35" class="header">Top Languages</text>

  <!-- Progress Bar total -->
  <g transform="translate(25, 50)">
    <!-- Background bar -->
    <rect x="0" y="0" width="250" height="8" rx="4" fill="#2a2b3d"/>
    <!-- JS 35% -->
    <rect x="0"   y="0" width="87.5" height="8" rx="4" fill="#f7df1e"/>
    <!-- Python 25% -->
    <rect x="87.5" y="0" width="62.5" height="8" rx="0"  fill="#3572A5"/>
    <!-- Java 20% -->
    <rect x="150" y="0" width="50"   height="8" rx="0"  fill="#b07219"/>
    <!-- HTML 10% -->
    <rect x="200" y="0" width="25"   height="8" rx="0"  fill="#e34c26"/>
    <!-- CSS 10% - last one with right radius -->
    <rect x="225" y="0" width="25"   height="8" rx="4"  fill="#563d7c"/>
  </g>

  <!-- Legend -->
  <!-- JS -->
  <g transform="translate(25, 80)">
    <circle cx="6" cy="6" r="6" fill="#f7df1e"/>
    <text x="18" y="11" class="lang-name">JavaScript</text>
    <text x="200" y="11" class="lang-pct">35.0%</text>
  </g>
  <!-- Python -->
  <g transform="translate(25, 105)">
    <circle cx="6" cy="6" r="6" fill="#3572A5"/>
    <text x="18" y="11" class="lang-name">Python</text>
    <text x="200" y="11" class="lang-pct">25.0%</text>
  </g>
  <!-- Java -->
  <g transform="translate(25, 130)">
    <circle cx="6" cy="6" r="6" fill="#b07219"/>
    <text x="18" y="11" class="lang-name">Java</text>
    <text x="200" y="11" class="lang-pct">20.0%</text>
  </g>
  <!-- HTML -->
  <g transform="translate(25, 155)">
    <circle cx="6" cy="6" r="6" fill="#e34c26"/>
    <text x="18" y="11" class="lang-name">HTML</text>
    <text x="200" y="11" class="lang-pct">10.0%</text>
  </g>
  <!-- CSS -->
  <g transform="translate(150, 155)">
    <circle cx="6" cy="6" r="6" fill="#563d7c"/>
    <text x="18" y="11" class="lang-name">CSS</text>
    <text x="82" y="11" class="lang-pct">10.0%</text>
  </g>
</svg>
