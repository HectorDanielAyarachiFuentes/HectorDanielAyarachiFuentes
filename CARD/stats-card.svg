<svg xmlns="http://www.w3.org/2000/svg" width="500" height="210" viewBox="0 0 500 210">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="headerG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Bar gradients -->
    <linearGradient id="barBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <linearGradient id="barPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#f7768e"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ece6a"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <linearGradient id="barOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#e0af68"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7768e"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="500" height="210" rx="10" fill="url(#bgG)" stroke="#2a2b3d" stroke-width="1"/>
  <!-- Left accent border -->
  <rect x="0" y="0" width="4" height="210" rx="2" fill="url(#headerG)"/>

  <!-- Header -->
  <text x="22" y="35" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="16" font-weight="600" fill="url(#headerG)" filter="url(#glow)">⚡ Hector's GitHub Stats</text>

  <!-- Divider -->
  <line x1="22" y1="45" x2="478" y2="45" stroke="#2a2b3d" stroke-width="1"/>

  <!-- Row helper: stat label, value, and bar -->
  <!-- Stars ⭐ -->
  <g transform="translate(22, 60)">
    <text x="0" y="12" font-family="'Segoe UI', sans-serif" font-size="13" fill="#a9b1d6">⭐ Stars Ganadas</text>
    <text x="310" y="12" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#c0caf5">47</text>
    <rect x="0" y="17" width="460" height="5" rx="2.5" fill="#2a2b3d"/>
    <rect x="0" y="17" width="180" height="5" rx="2.5" fill="url(#barBlue)"/>
  </g>

  <!-- Commits -->
  <g transform="translate(22, 95)">
    <text x="0" y="12" font-family="'Segoe UI', sans-serif" font-size="13" fill="#a9b1d6">🔥 Commits (2026)</text>
    <text x="310" y="12" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#c0caf5">583</text>
    <rect x="0" y="17" width="460" height="5" rx="2.5" fill="#2a2b3d"/>
    <rect x="0" y="17" width="320" height="5" rx="2.5" fill="url(#barPurple)"/>
  </g>

  <!-- PRs -->
  <g transform="translate(22, 130)">
    <text x="0" y="12" font-family="'Segoe UI', sans-serif" font-size="13" fill="#a9b1d6">🔀 Pull Requests</text>
    <text x="310" y="12" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#c0caf5">24</text>
    <rect x="0" y="17" width="460" height="5" rx="2.5" fill="#2a2b3d"/>
    <rect x="0" y="17" width="110" height="5" rx="2.5" fill="url(#barGreen)"/>
  </g>

  <!-- Issues -->
  <g transform="translate(22, 165)">
    <text x="0" y="12" font-family="'Segoe UI', sans-serif" font-size="13" fill="#a9b1d6">🐛 Issues Abiertos</text>
    <text x="310" y="12" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#c0caf5">8</text>
    <rect x="0" y="17" width="460" height="5" rx="2.5" fill="#2a2b3d"/>
    <rect x="0" y="17" width="70" height="5" rx="2.5" fill="url(#barOrange)"/>
  </g>

  <!-- Rank Badge -->
  <g transform="translate(400, 50)">
    <circle cx="30" cy="30" r="32" fill="none" stroke="#bb9af7" stroke-width="2.5" opacity="0.8"/>
    <circle cx="30" cy="30" r="32" fill="none" stroke="#7aa2f7" stroke-width="2.5" opacity="0.3" stroke-dasharray="201" stroke-dashoffset="40"/>
    <text x="30" y="24" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a9b1d6">RANK</text>
    <text x="30" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="800" fill="#bb9af7" filter="url(#glow)">A+</text>
  </g>
</svg>
