<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none" role="img" aria-labelledby="descId">
  <title id="descId">Hector's GitHub Stats</title>
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, sans-serif; fill: #a9b1d6; animation: fadeInAnimation 0.8s ease-in-out forwards; }
    .stat { font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", sans-serif; fill: #a9b1d6; }
    .bold { font-weight: 700; fill: #c0caf5; }
    .icon { fill: #7aa2f7; }
    .rank-text { font: 800 24px 'Segoe UI', Ubuntu, sans-serif; fill: #c0caf5; }
    .rank-percentile-header { font: 800 12px 'Segoe UI', Ubuntu, sans-serif; fill: #7aa2f7; }
    .rank-percentile-text { font: 800 24px 'Segoe UI', Ubuntu, sans-serif; fill: #c0caf5; }
    @keyframes scaleInAnimation { from { transform: translate(-5px, 5px) scale(0); opacity: 0; } to { transform: translate(-5px, 5px) scale(1); opacity: 1; } }
    @keyframes fadeInAnimation { from { opacity: 0; } to { opacity: 1; } }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" height="99%" stroke="#1a1b26" width="494" fill="#1a1b26" stroke-opacity="1"/>

  <!-- Header -->
  <g transform="translate(0, 0)">
    <g transform="translate(25, 35)">
      <text x="0" y="0" class="header" data-testid="header">Hector&#39;s GitHub Stats</text>
    </g>
  </g>

  <!-- Rank Circle -->
  <g transform="translate(360, 48)" stroke-opacity="1">
    <circle cx="42.5" cy="42.5" r="40" fill="#1a1b26" stroke="#bb9af7" stroke-width="5"/>
    <text x="42.5" y="49" text-anchor="middle" class="rank-text" fill="#bb9af7">A+</text>
  </g>

  <!-- Stars -->
  <g transform="translate(0, 35)">
    <g transform="translate(25, 40)">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total Stars Earned:</text>
      <text class="stat" x="230" y="12.5" data-testid="stars">100</text>
    </g>
    <g transform="translate(25, 60)">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M1.679 7.932c.412-.621 1.242-1.75 2.366-2.717C5.175 4.242 6.527 3.5 8 3.5c1.473 0 2.824.742 3.955 1.715 1.124.967 1.954 2.096 2.366 2.717a.119.119 0 010 .136c-.412.621-1.242 1.75-2.366 2.717C10.825 11.758 9.473 12.5 8 12.5c-1.473 0-2.824-.742-3.955-1.715C2.92 9.818 2.09 8.69 1.679 8.068a.119.119 0 010-.136zM8 2c-1.981 0-3.67.992-4.933 2.078C1.797 5.169.88 6.423.43 7.1a1.619 1.619 0 000 1.798c.45.678 1.367 1.932 2.637 3.024C4.329 13.008 6.019 14 8 14c1.981 0 3.67-.992 4.933-2.078 1.27-1.092 2.187-2.346 2.637-3.024a1.619 1.619 0 000-1.798c-.45-.678-1.367-1.932-2.637-3.024C11.671 2.992 9.981 2 8 2zm0 6.5a.5.5 0 110-1 .5.5 0 010 1zM6.5 8a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total Commits (2026):</text>
      <text class="stat" x="230" y="12.5" data-testid="commits">500+</text>
    </g>
    <g transform="translate(25, 80)">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0v-5.256A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v4a1 1 0 01-1 1H3a1 1 0 01-1-1V5a1 1 0 011-1h1V2.5H3a2.5 2.5 0 00-2.5 2.5v4A2.5 2.5 0 003 11.5h2.144a2.251 2.251 0 10-.144 1.5H11a2.5 2.5 0 002.5-2.5V5A2.5 2.5 0 0011 2.5zM9.75 11.25a.75.75 0 100 1.5.75.75 0 000-1.5z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total PRs:</text>
      <text class="stat" x="230" y="12.5" data-testid="prs">20+</text>
    </g>
    <g transform="translate(25, 100)">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3a1 1 0 11-2 0 1 1 0 012 0zm-.25-6.25a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total Issues:</text>
      <text class="stat" x="230" y="12.5" data-testid="issues">10+</text>
    </g>
    <g transform="translate(25, 120)">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Contributed to (last year):</text>
      <text class="stat" x="230" y="12.5" data-testid="contribs">5+</text>
    </g>
  </g>
</svg>
