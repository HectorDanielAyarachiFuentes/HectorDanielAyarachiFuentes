name: Metrics
on:
  schedule:
    - cron: "0 0 * * *" # Se actualiza cada 24 horas
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token con permisos 'read:user' y 'repo'
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Configuración básica
          user: HectorDanielAyarachiFuentes
          template: classic
          base: header
          
          # Plugin de Seguidores (Visual)
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 28
          plugin_people_size: 28
          
          # Plugin de Idiomas (Para dar color)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: lines, percentage
          
          # Estética y Salida
          config_timezone: America/Argentina/Buenos_Aires
          base_theme: tokyonight
          filename: CARD/followers-map.svg
