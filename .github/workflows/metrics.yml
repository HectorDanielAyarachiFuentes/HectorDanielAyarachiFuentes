name: Metrics
on:
  schedule:
    - cron: "0 0 * * *" # Se actualiza cada 24 horas
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token con permisos 'read:user' y 'repo'
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Configuración básica
          user: HectorDanielAyarachiFuentes
          template: repository # Probamos con este template que es muy robusto
          base: header
          
          # Plugin Worldmap
          plugin_worldmap: yes
          plugin_worldmap_token: ${{ secrets.METRICS_TOKEN }}
          plugin_worldmap_type: followers
          plugin_worldmap_limit: 1000
          
          # Estética y Salida
          config_timezone: America/Argentina/Buenos_Aires
          base_theme: tokyonight
          filename: CARD/followers-map.svg
